name: Build and Deploy

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'k8s/deployment.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: karmcs/mark-self-portfolio

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate image tag
        id: tag
        run: echo "TAG=$(date +%Y%m%d-%H%M%S)-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      
      - name: Deploy to k3s
        env:
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          KUBE_SERVER: ${{ secrets.KUBE_SERVER }}
        run: |
          kubectl config set-cluster k3s --server="${KUBE_SERVER}" --insecure-skip-tls-verify=true
          kubectl config set-credentials github-actions --token="${KUBE_TOKEN}"
          kubectl config set-context k3s --cluster=k3s --user=github-actions --namespace=default
          kubectl config use-context k3s
          
          kubectl set image deployment/portfolio portfolio=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }} -n default
